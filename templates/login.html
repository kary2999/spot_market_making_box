<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 28px;
      text-align: center;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color .2s;
      outline: none;
    }

    input:focus { border-color: #4f46e5; }
    input.invalid { border-color: #ef4444; }

    .field-error {
      font-size: 12px;
      color: #ef4444;
      margin-top: 4px;
      min-height: 16px;
    }

    .alert {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }

    .alert.locked { background: #fff7ed; border-color: #fed7aa; color: #c2410c; }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button[type="submit"]:hover:not(:disabled) { background: #4338ca; }
    button[type="submit"]:disabled { opacity: .65; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>用户登录</h1>

    <div class="alert" id="globalError" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">用户名</label>
        <input id="username" name="username" type="text"
               autocomplete="username" placeholder="请输入用户名" />
        <p class="field-error" id="usernameError"></p>
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" placeholder="请输入密码" />
        <p class="field-error" id="passwordError"></p>
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">登录</span>
      </button>
    </form>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
