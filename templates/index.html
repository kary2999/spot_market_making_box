<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    header {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h2 { font-size: 18px; color: #1a1a2e; }

    #userInfo { font-size: 14px; color: #555; display: flex; align-items: center; gap: 12px; }

    #logoutBtn {
      padding: 6px 14px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    #logoutBtn:hover { background: #dc2626; }

    main {
      max-width: 800px;
      margin: 48px auto;
      padding: 0 16px;
    }

    .welcome {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 36px;
      text-align: center;
    }

    .welcome h1 { font-size: 26px; color: #1a1a2e; margin-bottom: 8px; }
    .welcome p  { font-size: 15px; color: #666; }
  </style>
</head>
<body>
  <header>
    <h2>AiAgentManage</h2>
    <div id="userInfo">
      <span id="usernameDisplay"></span>
      <button id="logoutBtn">退出登录</button>
    </div>
  </header>

  <main>
    <div class="welcome">
      <h1>欢迎回来，<span id="welcomeName"></span></h1>
      <p>您已成功登录系统。</p>
    </div>
  </main>

  <script>
    (function () {
      const token = localStorage.getItem("access_token");
      const username = localStorage.getItem("username");

      if (!token) {
        window.location.href = "/login";
        return;
      }

      document.getElementById("usernameDisplay").textContent = username || "";
      document.getElementById("welcomeName").textContent = username || "用户";

      document.getElementById("logoutBtn").addEventListener("click", function () {
        localStorage.removeItem("access_token");
        localStorage.removeItem("refresh_token");
        localStorage.removeItem("username");
        window.location.href = "/login";
      });
    })();
  </script>
</body>
</html>
